###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, space, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, V, layoutmsg, togglesplit # dwindle
bind = $mainMod SHIFT, F, fullscreen,
bind = $mainMod, F, layoutmsg, colresize 1.0
bind = $mainMod, X, exec, grim $(xdg-user-dir PICTURES)/Screenshots/$(date +'%F_%T_grim.png') && notify-send -a grim -i /home/jade/.config/mako/icons/screenshot-icon.png "Screenshots saved to:" "~/Pictures/Screenshots/$(date +'%F_%T_grim.png')"
bind = $mainMod Alt, X, exec, grim -g "$(slurp)" $(xdg-user-dir PICTURES)/Screenshots/$(date +'%F_%T_grim.png') && notify-send -a grim -i /home/jade/.config/mako/icons/screenshot-icon.png "Screenshots saved to:" "~/Pictures/Screenshots/$(date +'%F_%T_grim.png')"
bind = $mainMod SHIFT, X, exec, hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | grim -g - $(xdg-user-dir PICTURES)/Screenshots/$(date +'%F_%T_grim.png') && notify-send -a grim -i /home/jade/.config/mako/icons/screenshot-icon.png "Screenshots saved to:" "~/Pictures/Screenshots/$(date +'%F_%T_grim.png')"
bind = $mainMod SHIFT Alt, X, exec, grim -g "$(slurp)" - | satty -f -
bind = $mainMod Alt, L, exec, swaylock
bind = $mainMod SHIFT, V, exec, /home/jade/.config/hypr/scripts/cliphist-fuzzel-img

# Move focus with mainMod + arrow keys
# bind = $mainMod, left, movefocus, l
# bind = $mainMod, right, movefocus, r
# bind = $mainMod, up, movefocus, u
# bind = $mainMod, down, movefocus, d
# bind = $mainMod, H, movefocus, l
# bind = $mainMod, L, movefocus, r
# bind = $mainMod, K, movefocus, u
# bind = $mainMod, J, movefocus, d
bind = $mainMod, left, layoutmsg, focus left
bind = $mainMod, right, layoutmsg, focus right
bind = $mainMod, up, layoutmsg, focus up
bind = $mainMod, down, layoutmsg, focus down
bind = $mainMod, H, layoutmsg, focus left
bind = $mainMod, L, layoutmsg, focus right
bind = $mainMod, K, layoutmsg, focus up
bind = $mainMod, J, layoutmsg, focus down
# Move focus window
bind = $mainMod SHIFT, left, layoutmsg, swapcol l
bind = $mainMod SHIFT, right, layoutmsg, swapcol r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, H, layoutmsg, swapcol l
bind = $mainMod SHIFT, L, layoutmsg, swapcol r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
# Resize windows with mainMod + R
bind = $mainMod, R,submap,resize
submap=resize
bind = , right, resizeactive, 192 0
bind = , left, resizeactive, -192 0
bind = , up, resizeactive, 0 -192
bind = , down, resizeactive, 0 192
bind = , L, resizeactive, 192 0
bind = , H, resizeactive, -192 0
bind = , K, resizeactive, 0 -192
bind = , J, resizeactive, 0 192
bind = , Return,submap,reset
bind = $mainMod, R,submap,reset
submap=reset
bind = $mainMod, equal, layoutmsg, colresize +conf
bind = $mainMod, minus, layoutmsg, colresize -conf

# Laptop multimedia keys for volume and LCD brightness
# bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
# bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = ,XF86AudioRaiseVolume, exec, /home/jade/.config/mako/wp-vol --inc
bindel = ,XF86AudioLowerVolume, exec, /home/jade/.config/mako/wp-vol --dec
bindel = ,XF86AudioMute, exec, /home/jade/.config/mako/wp-vol --toggle
bindel = ,XF86AudioMicMute, exec, /home/jade/.config/mako/wp-vol --toggle-mic
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

